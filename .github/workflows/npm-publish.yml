name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.2.3) — fallback when push-trigger misfires'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "::error::Tagged commit is not on main branch. Aborting publish."
            exit 1
          }

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            tag="${tag#v}"
          else
            tag="${GITHUB_REF#refs/tags/v}"
          fi
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Run tests
        run: |
          for t in tests/*.sh; do
            echo "::group::$t"
            bash "$t"
            echo "::endgroup::"
          done

      - name: Publish via Trusted Publishing (OIDC)
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, skipping"
          else
            gh release create "$TAG_NAME" --generate-notes
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq + xxd
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq xxd

      - name: Run test suite
        run: |
          set -e
          fail=0
          for t in tests/*.sh; do
            echo ""
            echo "=== $(basename "$t") ==="
            bash "$t" || fail=1
          done
          exit "$fail"
